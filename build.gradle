plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'org.beryx.jlink' version '3.2.1'
}

group = 'org.g2fx'
version = '0.0.1'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(24)
        vendor = JvmVendorSpec.ADOPTIUM // Temurin
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

javafx {
    version = '26'
    modules = ['javafx.controls', 'javafx.swing']
}

application {
    mainClass = 'org.g2fx.g2gui.G2GuiApplication'
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.mockito:mockito-core:4.2.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    implementation files('libs/libusb4java-1.3.0-darwin-aarch64.jar')
    implementation 'org.usb4java:usb4java:1.3.0'
    //implementation 'org.yaml:snakeyaml:2.3'
    //implementation 'info.picocli:picocli:4.7.6'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.19.1'
    implementation 'org.jline:jline:3.26.2'

    implementation 'com.google.guava:guava:33.4.8-jre'

    implementation 'org.controlsfx:controlsfx:11.1.2'
    implementation 'org.fxmisc.richtext:richtextfx:0.11.6'
}

tasks.test {
    useJUnitPlatform()

    jvmArgs += [
        '-Dglass.platform=headless',
        '-Djava.awt.headless=true',
        '--enable-native-access=ALL-UNNAMED'
    ]
}

tasks.register('runApp', JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.g2fx.g2gui.G2GuiApplication'

    jvmArgs += [
        '--module-path', configurations.runtimeClasspath.asPath,
        '--add-modules', 'javafx.controls',
        '--enable-native-access=javafx.graphics,ALL-UNNAMED'
    ]
}




configurations.matching { it.name.contains('downloadSources') }.configureEach {
    attributes {
        attribute(Usage.USAGE_ATTRIBUTE, objects.named(Usage, Usage.JAVA_RUNTIME))
        attribute(OperatingSystemFamily.OPERATING_SYSTEM_ATTRIBUTE, objects.named(OperatingSystemFamily, OperatingSystemFamily.MACOS))
        attribute(MachineArchitecture.ARCHITECTURE_ATTRIBUTE, objects.named(MachineArchitecture, 'aarch64'))
    }
}

tasks.register('printVersion') {
    doLast {
        println project.version
    }
}

def generatedResourcesDir = layout.buildDirectory.dir("generated-resources")

tasks.register('writeVersionProperties', WriteProperties) {
    outputFile = generatedResourcesDir.get().file("g2fx.version.properties").asFile
    encoding = 'UTF-8'
    property('g2fx.version', project.version)
    property('g2fx.build', String.format('%04d', (System.getenv('GITHUB_RUN_NUMBER') ?: '0').toInteger()))
}

sourceSets {
    main {
        resources.srcDir(generatedResourcesDir)
    }
}

tasks.named('processResources') {
    dependsOn(tasks.named('writeVersionProperties'))
}
